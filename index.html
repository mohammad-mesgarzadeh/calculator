<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/output.css">
</head>

<body class="p-0 m-0 box-border bg-[#F4F4F6]">
    <div class="flex justify-center items-center h-[623px] flex-col ">
        <div class=" bg-white p-9 rounded-2xl shadow-xl w-72 ">

            <div class="flex justify-between pb-4  ">
                <div class=" font-bold ">
                    Calculator
                </div>

                <div class="relative inline-block group">
                    <div
                        class="w-6 h-6 rounded-full bg-gray-700 text-white shadow-xl flex items-center justify-center cursor-pointer transition transform group-hover:-translate-y-2 ">
                        ?
                    </div>
                    <div class="absolute left-full top-1/2 ml-2 -translate-y-1/2 
              w-40 bg-gray-900 text-gray-100 text-sm rounded-lg p-3 shadow-lg
              opacity-0 group-hover:opacity-100 transition-opacity duration-200
              pointer-events-none z-50">
                        <p class="mb-1"><span class="text-amber-400">ESC / C</span> = Clear</p>
                        <p class="mb-1"><span class="text-amber-400">DELETE</span> = DEL</p>
                        <p><span class="text-amber-400">ENTER</span> = Equal</p>
                    </div>
                </div>

            </div>

            <input class="w-full bg-[#E9EAEC] text-right text-[#222222] text-3xl p-4 rounded-lg mb-4 outline-none"
                type="text" id="display" title="display" placeholder="0" disabled>

            <div class="grid grid-cols-4 gap-3 ">

                <button id="clear" title="clear" class="btn s1">c</button>
                <button id="delete" title="delete" class="btn s1">del</button>
                <button class="btn op">%</button>
                <button class="btn op">/</button>

                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn op">*</button>

                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn op">-</button>

                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn op">+</button>

                <button title="Empty" class="btn"></button>
                <button class="btn">0</button>
                <button class="btn op">.</button>
                <button id="equal"
                    class=" text-[#FFB74D] bg-[#E9EAEC] shadow-xl rounded-full h-10 w-10  uppercase cursor-pointer font-bold">=</button>

            </div>
        </div>
        <div class="text-sm text-gray-500 text-center py-4 ">
            Code by Mohammad Mesgarzadeh
        </div>

    </div>



    <footer class="flex w-full items-center justify-center ">
        <a class="w-10 h-10 rounded-full shadow-md hover:shadow-blue-500 transition transform hover:translate-y-[-10px] cursor-pointer"
            href="https://github.com/mohammad-mesgarzadeh"><img src="images/icons/GitHub.png" alt=""></a>
        <a class="w-10 h-10 rounded shadow-md hover:shadow-blue-500 transition transform hover:translate-y-[-10px] cursor-pointer "
            href="https://www.linkedin.com/in/mohammad-mesgarzadeh-a5422837a/"><img
                src="images/icons/Linkedin(black&white).png" alt=""></a>

        <div class="group relative inline-block">
            <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2
                bg-gray-800 text-white text-sm font-semibold py-2 px-3 rounded-lg shadow-lg
                opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100
                transition-all duration-300 pointer-events-none whitespace-nowrap">
                m_mesgarzade@yahoo.com
            </div>
            <div
                class="w-10 h-10 rounded shadow-md hover:shadow-blue-500 transition transform group-hover:-translate-y-2 cursor-pointer">
                <img src="images/icons/email.png" class="w-full h-full object-contain" alt="">
            </div>

        </div>
        <div class="group relative inline-block">
            <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2
                bg-gray-800 text-white text-sm font-semibold py-2 px-3 rounded-lg shadow-lg
                opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100
                transition-all duration-300 pointer-events-none whitespace-nowrap">
                09336153916
            </div>
            <div
                class="w-10 h-10 rounded shadow-md hover:shadow-blue-500 transition transform group-hover:-translate-y-2 cursor-pointer">
                <img src="images/icons/Phone.png" class="w-full h-full object-contain" alt="">
            </div>
        </div>

    </footer>



    <script src="app.js"></script>

</body>

</html>
